{% extends 'base.html' %}

{% block titre %}Calendrier — EisenAgenda{% endblock %}

{% block content %}
<h1 class="titre-page">📅 Calendrier</h1>

<!-- Contrôles du calendrier -->
<div class="calendrier-controles">
    <button class="btn btn-secondaire" id="btn-precedent" onclick="naviguer(-1)">&#8249; Précédent</button>

    <span class="calendrier-titre-mois" id="titre-mois">Chargement...</span>

    <button class="btn btn-secondaire" id="btn-suivant" onclick="naviguer(1)">Suivant &#8250;</button>

    <button class="btn btn-secondaire" onclick="allerAujourdhui()">Aujourd'hui</button>

    <div class="toggle-vue">
        <button id="btn-mensuel" class="actif" onclick="changerVue('mensuel')">Mois</button>
        <button id="btn-hebdo" onclick="changerVue('hebdomadaire')">Semaine</button>
    </div>
</div>

<!-- Conteneur du calendrier (rempli par JS) -->
<div class="calendrier-grille" id="calendrier"></div>
{% endblock %}

{% block scripts %}
<script>
// Données injectées par Flask
const tachesInitiales = {{ taches_json | safe }};
</script>
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
