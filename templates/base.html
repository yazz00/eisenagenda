<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}EisenAgenda{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-entete">
        <a href="/calendar" class="sidebar-logo">📋 <span class="sidebar-texte">EisenAgenda</span></a>
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Réduire le menu">&#8249;</button>
    </div>

    <nav class="sidebar-nav">
        <a href="/calendar" class="sidebar-lien {% if request.endpoint in ('pages.page_calendrier', 'pages.page_ma_journee') %}actif{% endif %}" title="Planning">
            <span class="sidebar-icone">📅</span><span class="sidebar-texte">Planning</span>
        </a>
        <a href="/projects" class="sidebar-lien {% if request.endpoint == 'pages.page_projets' %}actif{% endif %}" title="Projets">
            <span class="sidebar-icone">🌳</span><span class="sidebar-texte">Projets</span>
        </a>
        <a href="/recurrence" class="sidebar-lien {% if request.endpoint == 'pages.page_recurrence' %}actif{% endif %}" title="Récurrence">
            <span class="sidebar-icone">🔁</span><span class="sidebar-texte">Récurrence</span>
        </a>
        <a href="/dashboard" class="sidebar-lien {% if request.endpoint in ('pages.page_tableau_de_bord', 'pages.page_matrice') %}actif{% endif %}" title="Vue d'ensemble">
            <span class="sidebar-icone">🗂</span><span class="sidebar-texte">Vue d'ensemble</span>
        </a>
        <a href="/trash" class="sidebar-lien {% if request.endpoint == 'pages.page_corbeille' %}actif{% endif %}" title="Corbeille">
            <span class="sidebar-icone">📋</span><span class="sidebar-texte">Historique</span>
        </a>
    </nav>

    <a href="#" class="sidebar-btn-tache" onclick="ouvrirModal(); return false;" title="Nouvelle tâche">
        <span class="sidebar-icone">✚</span><span class="sidebar-texte"> Nouvelle tâche</span>
    </a>
</aside>

<script>
const SIDEBAR_OUVERTE  = '220px';
const SIDEBAR_REDUITE  = '56px';

function appliquerSidebar(reduite, anime) {
    const sidebar = document.getElementById('sidebar');
    // Désactiver la transition si chargement initial
    if (!anime) {
        sidebar.style.transition = 'none';
        document.body.style.transition = 'none';
    }
    sidebar.classList.toggle('sidebar--reduite', reduite);
    document.body.style.paddingLeft = reduite ? SIDEBAR_REDUITE : SIDEBAR_OUVERTE;
    sidebar.querySelector('.sidebar-toggle').innerHTML = reduite ? '&#8250;' : '&#8249;';
    // Réactiver la transition après application
    if (!anime) {
        requestAnimationFrame(() => {
            sidebar.style.transition = '';
            document.body.style.transition = '';
        });
    }
}

function toggleSidebar() {
    const reduite = !document.getElementById('sidebar').classList.contains('sidebar--reduite');
    appliquerSidebar(reduite, true);
    localStorage.setItem('sidebar-reduite', reduite ? '1' : '0');
}

// Restaurer l'état immédiatement sans animation
appliquerSidebar(localStorage.getItem('sidebar-reduite') === '1', false);
</script>

<!-- ===== CONTENU DE LA PAGE ===== -->
<main class="contenu">
    {% block content %}{% endblock %}
</main>

<!-- ===== MODAL FORMULAIRE DE TÂCHE ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="fermerModalSiExterieur(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titre-label">
        <button class="modal-fermer" onclick="fermerModal()" aria-label="Fermer">×</button>
        <h2 class="modal-titre" id="modal-titre-label">Nouvelle tâche</h2>

        <div id="modal-erreurs" class="alerte alerte-erreur" style="display:none;"></div>

        <form id="form-tache" onsubmit="sauvegarderTache(event)">
            <input type="hidden" id="tache-id" value="">
            <input type="hidden" id="tache-projet-id" value="">
            <input type="hidden" id="tache-parent-id" value="">

            <div class="form-groupe">
                <label class="form-label" for="tache-titre">
                    Titre <span class="requis">*</span>
                </label>
                <input type="text" id="tache-titre" class="form-input"
                       placeholder="Ex : Préparer la réunion client" required maxlength="200">
            </div>

            <div class="form-groupe">
                <label class="form-label" for="tache-description">Description</label>
                <textarea id="tache-description" class="form-textarea"
                          placeholder="Détails optionnels..."></textarea>
            </div>

            <div class="form-grille-2">
                <div class="form-groupe">
                    <label class="form-label" for="tache-date">Date d'échéance</label>
                    <input type="date" id="tache-date" class="form-input">
                </div>
                <div class="form-groupe">
                    <label class="form-label">Durée estimée</label>
                    <div style="display:flex; gap:0.4rem; align-items:center;">
                        <input type="number" id="tache-duree-h" class="form-input"
                               placeholder="0" min="0" max="23" step="1"
                               style="width:60px; text-align:center;">
                        <span style="color:var(--texte-secondaire); font-size:0.85rem;">h</span>
                        <input type="number" id="tache-duree-m" class="form-input"
                               placeholder="0" min="0" max="59" step="5"
                               style="width:60px; text-align:center;">
                        <span style="color:var(--texte-secondaire); font-size:0.85rem;">min</span>
                    </div>
                </div>
            </div>

            <!-- Heure de début — toujours disponible -->
            <div class="form-groupe" id="groupe-heure-debut">
                <label class="form-label" for="tache-heure-debut">Heure de début</label>
                <input type="time" id="tache-heure-debut" class="form-input">
            </div>

            <!-- Champs récurrence — affichés uniquement sur la page Récurrence -->
            <div id="groupe-recurrence" style="display:none;">

                <!-- Sélecteur de type (masqué si section connue) -->
                <div id="groupe-type-recurrence">
                    <div class="form-groupe">
                        <label class="form-label" for="tache-recurrence">Récurrence</label>
                        <select id="tache-recurrence" class="form-select"
                                onchange="if(typeof mettreAJourChampsDates==='function') mettreAJourChampsDates()">
                            <option value="Une fois">Une fois</option>
                            <option value="Quotidien">Quotidien</option>
                            <option value="Hebdomadaire">Hebdomadaire</option>
                            <option value="Mensuel">Mensuel</option>
                            <option value="Autres">Autres (dates spécifiques)</option>
                        </select>
                    </div>
                </div>

                <!-- Auto-régénération (visible pour Quotidien et Hebdomadaire) -->
                <div id="groupe-auto-regenerer" style="display:none;">
                    <div class="form-groupe" style="display:flex; align-items:center; padding-bottom:0.25rem;">
                        <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer; font-size:0.88rem; color:var(--texte-secondaire);">
                            <input type="checkbox" id="tache-auto-regenerer"
                                   onchange="if(typeof mettreAJourChampsDates==='function') mettreAJourChampsDates()">
                            🔄 Recréer automatiquement quand marquée "Fait"
                        </label>
                    </div>
                </div>

                <!-- Date de fin — mode classique (sans auto-régénération) -->
                <div id="groupe-date-fin" style="display:none;">
                    <div class="form-groupe">
                        <label class="form-label" for="tache-date-fin">
                            Répéter jusqu'au <span class="requis">*</span>
                        </label>
                        <input type="date" id="tache-date-fin" class="form-input">
                    </div>
                </div>

                <!-- Sélecteur jours de la semaine (Hebdomadaire classique) -->
                <div id="groupe-jours-semaine" style="display:none;">
                    <div class="form-groupe">
                        <label class="form-label">Jours à répéter</label>
                        <div class="jours-semaine-picker">
                            <button type="button" class="jour-picker-btn" data-index="0">Lun</button>
                            <button type="button" class="jour-picker-btn" data-index="1">Mar</button>
                            <button type="button" class="jour-picker-btn" data-index="2">Mer</button>
                            <button type="button" class="jour-picker-btn" data-index="3">Jeu</button>
                            <button type="button" class="jour-picker-btn" data-index="4">Ven</button>
                            <button type="button" class="jour-picker-btn" data-index="5">Sam</button>
                            <button type="button" class="jour-picker-btn" data-index="6">Dim</button>
                        </div>
                    </div>
                </div>

                <!-- Sélecteur jours du mois (Mensuel classique) -->
                <div id="groupe-jours-mois" style="display:none;">
                    <div class="form-groupe">
                        <label class="form-label">Jours du mois à répéter</label>
                        <div class="jours-mois-picker" id="jours-mois-picker">
                            {% for j in range(1, 32) %}
                            <button type="button" class="jour-mois-btn" data-jour="{{ j }}">{{ j }}</button>
                            {% endfor %}
                        </div>
                    </div>
                </div>

                <!-- Mini-calendrier pour "Autres" -->
                <div id="groupe-mini-cal-modal" style="display:none;">
                    <div class="form-groupe">
                        <label class="form-label">Sélectionne les dates</label>
                        <div class="mini-cal-conteneur" style="max-width:100%;">
                            <div class="mini-cal-nav">
                                <button type="button" class="btn btn-secondaire btn-sm" onclick="naviguerMiniCalModal(-1)">&#8249;</button>
                                <span id="mini-cal-modal-titre" class="mini-cal-titre"></span>
                                <button type="button" class="btn btn-secondaire btn-sm" onclick="naviguerMiniCalModal(1)">&#8250;</button>
                            </div>
                            <div class="mini-cal-grille">
                                <div class="mini-cal-entetes">
                                    <span>Lu</span><span>Ma</span><span>Me</span>
                                    <span>Je</span><span>Ve</span><span>Sa</span><span>Di</span>
                                </div>
                                <div class="mini-cal-jours" id="mini-cal-modal-jours"></div>
                            </div>
                        </div>
                        <div id="modal-dates-liste" class="autres-dates-liste" style="margin-top:0.5rem;">
                            <span style="color:var(--texte-secondaire);font-size:0.85rem;">Aucune date sélectionnée</span>
                        </div>
                    </div>
                </div>

            </div>

            <div class="form-grille-2">
                <div class="form-groupe">
                    <label class="form-label" for="tache-categorie">Catégorie</label>
                    <select id="tache-categorie" class="form-select">
                        <option value="Travail">💼 Travail</option>
                        <option value="Personnel">🏠 Personnel</option>
                        <option value="Santé">💚 Santé</option>
                        <option value="Autre" selected>📌 Autre</option>
                    </select>
                </div>
                <div class="form-groupe">
                    <label class="form-label" for="tache-zone">Zone Eisenhower</label>
                    <select id="tache-zone" class="form-select">
                        <option value="urgent_important">🔴 Urgent + Important</option>
                        <option value="important">🔵 Pas urgent + Important</option>
                        <option value="urgent">🟡 Urgent + Pas important</option>
                        <option value="neutre">⚫ Pas urgent + Pas important</option>
                        <option value="fait">✅ Fait</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondaire" onclick="fermerModal()">
                    Annuler
                </button>
                <button type="submit" class="btn btn-primaire" id="btn-sauvegarder">
                    💾 Sauvegarder
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ===== SCRIPTS DE BASE ===== -->
<script>
// ===== UTILITAIRES GLOBAUX =====

function formaterDuree(min) {
    if (!min) return '';
    const h = Math.floor(min / 60);
    const m = min % 60;
    if (h > 0 && m > 0) return `${h}h${String(m).padStart(2, '0')}`;
    if (h > 0) return `${h}h`;
    return `${m}min`;
}

function lireDureeMinutes() {
    const h = parseInt(document.getElementById('tache-duree-h').value) || 0;
    const m = parseInt(document.getElementById('tache-duree-m').value) || 0;
    const total = h * 60 + m;
    return total > 0 ? total : null;
}

function remplirDuree(minutes) {
    const min = minutes || 0;
    document.getElementById('tache-duree-h').value = min > 0 ? Math.floor(min / 60) : '';
    document.getElementById('tache-duree-m').value = min > 0 ? min % 60 : '';
}

// ===== MINI-CALENDRIER MODAL (récurrence "Autres") =====

const MOIS_NOMS_MODAL = [
    'Janvier','Février','Mars','Avril','Mai','Juin',
    'Juillet','Août','Septembre','Octobre','Novembre','Décembre'
];
let datesModalSelectionnees = new Set();
let dateMiniCalModal = new Date();

function naviguerMiniCalModal(direction) {
    dateMiniCalModal.setMonth(dateMiniCalModal.getMonth() + direction);
    rendreMiniCalModal();
}

function rendreMiniCalModal() {
    const titre = document.getElementById('mini-cal-modal-titre');
    const grille = document.getElementById('mini-cal-modal-jours');
    if (!titre || !grille) return;

    const annee = dateMiniCalModal.getFullYear();
    const mois  = dateMiniCalModal.getMonth();
    titre.textContent = `${MOIS_NOMS_MODAL[mois]} ${annee}`;

    const premierJour = new Date(annee, mois, 1);
    let debutSemaine = premierJour.getDay() - 1;
    if (debutSemaine < 0) debutSemaine = 6;
    const dernierJour = new Date(annee, mois + 1, 0).getDate();
    const aujourd_hui = new Date().toISOString().slice(0, 10);

    grille.innerHTML = '';
    for (let i = 0; i < debutSemaine; i++) {
        const vide = document.createElement('div');
        vide.className = 'mini-cal-jour mini-cal-vide';
        grille.appendChild(vide);
    }
    for (let j = 1; j <= dernierJour; j++) {
        const dateISO = `${annee}-${String(mois+1).padStart(2,'0')}-${String(j).padStart(2,'0')}`;
        const cel = document.createElement('div');
        cel.className = 'mini-cal-jour'
            + (dateISO === aujourd_hui ? ' mini-cal-aujourd-hui' : '')
            + (datesModalSelectionnees.has(dateISO) ? ' mini-cal-selectionne' : '');
        cel.textContent = j;
        cel.addEventListener('click', () => {
            if (datesModalSelectionnees.has(dateISO)) {
                datesModalSelectionnees.delete(dateISO);
                cel.classList.remove('mini-cal-selectionne');
            } else {
                datesModalSelectionnees.add(dateISO);
                cel.classList.add('mini-cal-selectionne');
            }
            mettreAJourDatesModal();
        });
        grille.appendChild(cel);
    }
}

function mettreAJourDatesModal() {
    const liste = document.getElementById('modal-dates-liste');
    if (!liste) return;
    if (datesModalSelectionnees.size === 0) {
        liste.innerHTML = '<span style="color:var(--texte-secondaire);font-size:0.85rem;">Aucune date sélectionnée</span>';
        return;
    }
    const dates = [...datesModalSelectionnees].sort();
    liste.innerHTML = dates.map(d => {
        const [a, m, j] = d.split('-');
        return `<span class="autres-date-chip">${j}/${m}/${a}
            <button type="button" onclick="retirerDateModal('${d}')" title="Retirer">×</button>
        </span>`;
    }).join('');
}

function retirerDateModal(dateISO) {
    datesModalSelectionnees.delete(dateISO);
    mettreAJourDatesModal();
    rendreMiniCalModal();
}

// ===== GESTION DU MODAL =====

let tacheEnCoursId = null; // ID de la tâche en cours de modification

function ouvrirModal(tache = null, zonePrecochee = null, heurePrecochee = null) {
    const overlay = document.getElementById('modal-overlay');
    const titreModal = document.getElementById('modal-titre-label');
    const erreurs = document.getElementById('modal-erreurs');

    // Réinitialiser le formulaire et le submit
    document.getElementById('form-tache').reset();
    document.getElementById('form-tache').onsubmit = sauvegarderTache;
    erreurs.style.display = 'none';
    erreurs.textContent = '';

    // Réinitialiser la visibilité des champs récurrence
    document.getElementById('groupe-type-recurrence').style.display = '';
    document.getElementById('groupe-auto-regenerer').style.display = 'none';
    document.getElementById('groupe-date-fin').style.display = 'none';
    document.getElementById('groupe-jours-semaine').style.display = 'none';
    document.getElementById('groupe-jours-mois').style.display = 'none';
    document.getElementById('groupe-mini-cal-modal').style.display = 'none';
    datesModalSelectionnees.clear();
    rendreMiniCalModal();
    // Effacer les sélections de jours
    document.querySelectorAll('.jour-picker-btn.selectionne, .jour-mois-btn.selectionne')
        .forEach(b => b.classList.remove('selectionne'));

    if (tache) {
        // Mode modification
        tacheEnCoursId = tache.id;
        titreModal.textContent = 'Modifier la tâche';
        document.getElementById('tache-id').value = tache.id;
        document.getElementById('tache-titre').value = tache.titre || '';
        document.getElementById('tache-description').value = tache.description || '';
        document.getElementById('tache-date').value = tache.date_echeance || '';
        remplirDuree(tache.duree_estimee);
        document.getElementById('tache-categorie').value = tache.categorie || 'Autre';
        document.getElementById('tache-zone').value = tache.zone || 'urgent_important';
        document.getElementById('tache-heure-debut').value = tache.heure_debut || '';
        document.getElementById('tache-recurrence').value = tache.recurrence || 'Une fois';
        document.getElementById('tache-auto-regenerer').checked = tache.auto_regenerer || false;
        document.getElementById('tache-projet-id').value = tache.projet_id || '';
        document.getElementById('tache-parent-id').value = tache.parent_id || '';
    } else {
        // Mode création
        tacheEnCoursId = null;
        titreModal.textContent = 'Nouvelle tâche';
        document.getElementById('tache-id').value = '';
        document.getElementById('tache-projet-id').value = '';
        document.getElementById('tache-parent-id').value = '';
        if (zonePrecochee) {
            document.getElementById('tache-zone').value = zonePrecochee;
        }
        if (heurePrecochee) {
            document.getElementById('tache-heure-debut').value = heurePrecochee;
        }
    }

    overlay.classList.add('actif');
    document.getElementById('tache-titre').focus();
}

function fermerModal() {
    document.getElementById('modal-overlay').classList.remove('actif');
    tacheEnCoursId = null;
}

function fermerModalSiExterieur(event) {
    if (event.target === document.getElementById('modal-overlay')) {
        fermerModal();
    }
}

// Fermer avec Escape
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') fermerModal();
});

async function sauvegarderTache(event) {
    event.preventDefault();

    const erreurs = document.getElementById('modal-erreurs');
    erreurs.style.display = 'none';

    const champHeure = document.getElementById('tache-heure-debut');
    const donnees = {
        titre: document.getElementById('tache-titre').value.trim(),
        description: document.getElementById('tache-description').value.trim() || null,
        date_echeance: document.getElementById('tache-date').value || null,
        duree_estimee: lireDureeMinutes(),
        categorie: document.getElementById('tache-categorie').value,
        zone: document.getElementById('tache-zone').value,
        heure_debut: champHeure.value || null,
        recurrence: document.getElementById('tache-recurrence').value === 'Autres'
            ? 'Une fois' : document.getElementById('tache-recurrence').value,
        auto_regenerer: document.getElementById('tache-auto-regenerer').checked,
        projet_id: document.getElementById('tache-projet-id').value
            ? parseInt(document.getElementById('tache-projet-id').value) : null,
        parent_id: document.getElementById('tache-parent-id').value
            ? parseInt(document.getElementById('tache-parent-id').value) : null,
    };

    const estModification = tacheEnCoursId !== null;
    const url = estModification ? `/api/tasks/${tacheEnCoursId}` : '/api/tasks';
    const methode = estModification ? 'PUT' : 'POST';

    try {
        const reponse = await fetch(url, {
            method: methode,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(donnees),
        });

        const resultat = await reponse.json();

        if (!reponse.ok) {
            const msgs = resultat.erreurs || [resultat.erreur || 'Erreur inconnue.'];
            erreurs.innerHTML = msgs.join('<br>');
            erreurs.style.display = 'block';
            return;
        }

        fermerModal();

        // Rafraîchir l'affichage si la fonction existe (définie dans chaque page JS)
        if (typeof apresModificationTache === 'function') {
            apresModificationTache(resultat, estModification);
            // Si auto-régénération a créé une nouvelle occurrence, l'ajouter aussi
            if (resultat._nouvelle_occurrence) {
                apresModificationTache(resultat._nouvelle_occurrence, false);
            }
        } else {
            window.location.reload();
        }

    } catch (err) {
        erreurs.textContent = 'Erreur de connexion au serveur.';
        erreurs.style.display = 'block';
    }
}
</script>

{% block scripts %}{% endblock %}

</body>
</html>
